<svg xmlns="http://www.w3.org/2000/svg" width="820" height="312" viewBox="0 0 820 312">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="820" height="312" fill="url(#bg)"/>
  <!-- Background glow -->
  <circle cx="700" cy="50" r="150" fill="#34d399" opacity="0.05"/>
  <!-- Logo -->
  <rect x="50" y="90" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="90" y="150" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Text -->
  <text x="155" y="125" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">App Generator</text>
  <text x="155" y="162" font-family="Arial, sans-serif" font-size="20" fill="#34d399">Build Desktop Apps with AI</text>
  <!-- URL -->
  <text x="50" y="260" font-family="Arial, sans-serif" font-size="18" fill="#64748b">app.website-generator.net</text>
  <!-- Free badge -->
  <rect x="620" y="230" width="160" height="36" rx="18" fill="url(#accent)" opacity="0.15"/>
  <text x="700" y="254" font-family="Arial, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">Free &amp; Open Source</text>
  <!-- Mini mockup -->
  <rect x="580" y="50" width="200" height="160" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="590" y="60" width="180" height="18" rx="4" fill="#0f172a"/>
  <circle cx="600" cy="69" r="3" fill="#ef4444"/>
  <circle cx="612" cy="69" r="3" fill="#eab308"/>
  <circle cx="624" cy="69" r="3" fill="#22c55e"/>
  <rect x="590" y="85" width="50" height="115" rx="2" fill="#0f172a"/>
  <rect x="648" y="85" width="122" height="115" rx="2" fill="#0f172a"/>
  <rect x="596" y="92" width="38" height="5" rx="1" fill="#34d399" opacity="0.5"/>
  <rect x="655" y="92" width="60" height="6" rx="1" fill="#34d399" opacity="0.4"/>
  <rect x="655" y="105" width="100" height="4" rx="1" fill="#475569"/>
  <rect x="655" y="115" width="90" height="4" rx="1" fill="#475569"/>
</svg>