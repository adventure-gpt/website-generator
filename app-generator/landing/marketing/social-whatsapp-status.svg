<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="540" cy="960" r="500" fill="#34d399" opacity="0.03"/>
  <circle cx="900" cy="300" r="200" fill="#10b981" opacity="0.04"/>
  <circle cx="180" cy="1600" r="200" fill="#34d399" opacity="0.04"/>
  <!-- Logo centered -->
  <rect x="390" y="550" width="300" height="300" rx="60" fill="url(#accent)"/>
  <text x="540" y="750" font-family="Arial, sans-serif" font-size="210" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- App name -->
  <text x="540" y="980" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <!-- Divider line -->
  <rect x="440" y="1020" width="200" height="4" rx="2" fill="#34d399"/>
  <!-- Tagline -->
  <text x="540" y="1110" font-family="Arial, sans-serif" font-size="52" fill="#34d399" text-anchor="middle">Describe it.</text>
  <text x="540" y="1180" font-family="Arial, sans-serif" font-size="52" fill="#34d399" text-anchor="middle">AI builds it.</text>
  <!-- Features -->
  <text x="540" y="1340" font-family="Arial, sans-serif" font-size="34" fill="#94a3b8" text-anchor="middle">No coding required</text>
  <text x="540" y="1400" font-family="Arial, sans-serif" font-size="34" fill="#94a3b8" text-anchor="middle">Windows, Mac &amp; Linux</text>
  <text x="540" y="1460" font-family="Arial, sans-serif" font-size="34" fill="#94a3b8" text-anchor="middle">Free &amp; open source</text>
  <!-- CTA -->
  <rect x="290" y="1580" width="500" height="100" rx="50" fill="url(#accent)"/>
  <text x="540" y="1645" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Now</text>
  <!-- URL -->
  <text x="540" y="1790" font-family="Arial, sans-serif" font-size="32" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
</svg>