<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="80" y="60" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <text x="180" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">App Generator</text>
  <text x="1840" y="100" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="end">app.website-generator.net</text>
  <!-- Title -->
  <text x="960" y="230" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">How It Works</text>
  <rect x="860" y="250" width="200" height="4" rx="2" fill="#34d399"/>
  <text x="960" y="295" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Three simple steps from idea to desktop application</text>
  <!-- Connecting line -->
  <line x1="350" y1="520" x2="1570" y2="520" stroke="#34d399" stroke-width="2" opacity="0.3"/>
  <!-- Step 1 -->
  <circle cx="350" cy="520" r="50" fill="url(#accent)"/>
  <text x="350" y="535" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0f172a" text-anchor="middle">1</text>
  <text x="350" y="610" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Describe</text>
  <!-- Step 1 mockup -->
  <rect x="210" y="660" width="280" height="180" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="230" y="680" width="240" height="60" rx="8" fill="#0f172a"/>
  <text x="250" y="705" font-family="Arial, sans-serif" font-size="12" fill="#475569">"I want a task manager</text>
  <text x="250" y="722" font-family="Arial, sans-serif" font-size="12" fill="#475569">with categories and...</text>
  <rect x="230" y="760" width="120" height="34" rx="8" fill="url(#accent)"/>
  <text x="290" y="783" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Generate</text>
  <text x="350" y="880" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Type what you want</text>
  <text x="350" y="905" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">in plain English</text>

  <!-- Step 2 -->
  <circle cx="960" cy="520" r="50" fill="url(#accent)"/>
  <text x="960" y="535" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0f172a" text-anchor="middle">2</text>
  <text x="960" y="610" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Generate</text>
  <!-- Step 2 mockup -->
  <rect x="820" y="660" width="280" height="180" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="840" y="680" width="240" height="12" rx="2" fill="#34d399" opacity="0.4"/>
  <rect x="840" y="700" width="200" height="8" rx="2" fill="#475569"/>
  <rect x="840" y="716" width="220" height="8" rx="2" fill="#475569"/>
  <rect x="840" y="732" width="180" height="8" rx="2" fill="#475569"/>
  <rect x="840" y="748" width="210" height="8" rx="2" fill="#475569"/>
  <rect x="840" y="764" width="190" height="8" rx="2" fill="#475569"/>
  <!-- Progress bar -->
  <rect x="840" y="800" width="240" height="8" rx="4" fill="#0f172a"/>
  <rect x="840" y="800" width="160" height="8" rx="4" fill="url(#accent)"/>
  <text x="960" y="880" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">AI writes all the code</text>
  <text x="960" y="905" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">automatically</text>

  <!-- Step 3 -->
  <circle cx="1570" cy="520" r="50" fill="url(#accent)"/>
  <text x="1570" y="535" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0f172a" text-anchor="middle">3</text>
  <text x="1570" y="610" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Download</text>
  <!-- Step 3 mockup -->
  <rect x="1430" y="660" width="280" height="180" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="1450" y="680" width="240" height="30" rx="4" fill="#0f172a"/>
  <circle cx="1465" cy="695" r="5" fill="#ef4444"/>
  <circle cx="1480" cy="695" r="5" fill="#eab308"/>
  <circle cx="1495" cy="695" r="5" fill="#22c55e"/>
  <rect x="1450" y="720" width="70" height="100" rx="2" fill="#0f172a"/>
  <rect x="1528" y="720" width="162" height="100" rx="2" fill="#0f172a"/>
  <text x="1570" y="880" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Get your finished app</text>
  <text x="1570" y="905" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">for any platform</text>

  <!-- Bottom -->
  <text x="960" y="1010" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">How It Works</text>
</svg>