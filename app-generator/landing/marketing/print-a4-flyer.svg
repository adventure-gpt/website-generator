<svg xmlns="http://www.w3.org/2000/svg" width="794" height="1123" viewBox="0 0 794 1123">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="794" height="1123" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="650" cy="150" r="200" fill="#34d399" opacity="0.04"/>
  <circle cx="150" cy="950" r="180" fill="#10b981" opacity="0.04"/>
  <!-- Logo -->
  <rect x="297" y="80" width="200" height="200" rx="40" fill="url(#accent)"/>
  <text x="397" y="220" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Title -->
  <text x="397" y="370" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <!-- Tagline -->
  <text x="397" y="430" font-family="Arial, sans-serif" font-size="28" fill="#34d399" text-anchor="middle">Build Desktop Apps with AI</text>
  <!-- Divider -->
  <rect x="297" y="460" width="200" height="4" rx="2" fill="#34d399"/>
  <!-- How it works -->
  <text x="397" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">How It Works</text>
  <!-- Step 1 -->
  <circle cx="160" cy="600" r="28" fill="url(#accent)"/>
  <text x="160" y="610" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">1</text>
  <text x="210" y="595" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Describe Your Idea</text>
  <text x="210" y="620" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Type what you want in plain English</text>
  <!-- Step 2 -->
  <circle cx="160" cy="690" r="28" fill="url(#accent)"/>
  <text x="160" y="700" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">2</text>
  <text x="210" y="685" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">AI Generates Code</text>
  <text x="210" y="710" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Complete app built automatically</text>
  <!-- Step 3 -->
  <circle cx="160" cy="780" r="28" fill="url(#accent)"/>
  <text x="160" y="790" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">3</text>
  <text x="210" y="775" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Download &amp; Share</text>
  <text x="210" y="800" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Get installers for Windows, Mac &amp; Linux</text>
  <!-- Features bar -->
  <rect x="80" y="860" width="634" height="80" rx="12" fill="#1e293b"/>
  <text x="200" y="908" font-family="Arial, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">No Coding</text>
  <text x="397" y="908" font-family="Arial, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">Cross-Platform</text>
  <text x="594" y="908" font-family="Arial, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">Open Source</text>
  <!-- CTA -->
  <rect x="247" y="980" width="300" height="60" rx="30" fill="url(#accent)"/>
  <text x="397" y="1018" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- URL -->
  <text x="397" y="1080" font-family="Arial, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
