<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="300" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="300" height="600" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- Decorative -->
  <circle cx="250" cy="50" r="100" fill="#34d399" opacity="0.04"/>
  <!-- Logo -->
  <rect x="100" y="30" width="100" height="100" rx="20" fill="url(#accent)"/>
  <text x="150" y="100" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Name -->
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <!-- Divider -->
  <rect x="100" y="190" width="100" height="3" rx="1.5" fill="#34d399"/>
  <!-- Tagline -->
  <text x="150" y="225" font-family="Arial, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">Build Desktop Apps with AI</text>
  <!-- Features list -->
  <text x="150" y="275" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Describe in plain English</text>
  <text x="150" y="305" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">AI generates complete app</text>
  <text x="150" y="335" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Windows, Mac &amp; Linux</text>
  <text x="150" y="365" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Free &amp; open source</text>
  <!-- Mockup -->
  <rect x="30" y="400" width="240" height="110" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="40" y="410" width="220" height="16" rx="4" fill="#0f172a"/>
  <circle cx="50" cy="418" r="3" fill="#ef4444"/>
  <circle cx="62" cy="418" r="3" fill="#eab308"/>
  <circle cx="74" cy="418" r="3" fill="#22c55e"/>
  <rect x="40" y="432" width="60" height="68" rx="2" fill="#0f172a"/>
  <rect x="108" y="432" width="152" height="68" rx="2" fill="#0f172a"/>
  <rect x="48" y="440" width="44" height="5" rx="1" fill="#34d399" opacity="0.5"/>
  <rect x="116" y="440" width="80" height="6" rx="1" fill="#34d399" opacity="0.4"/>
  <rect x="116" y="452" width="130" height="4" rx="1" fill="#475569"/>
  <rect x="116" y="462" width="120" height="4" rx="1" fill="#475569"/>
  <!-- CTA -->
  <rect x="50" y="535" width="200" height="36" rx="18" fill="url(#accent)"/>
  <text x="150" y="559" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- URL -->
  <text x="150" y="585" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
