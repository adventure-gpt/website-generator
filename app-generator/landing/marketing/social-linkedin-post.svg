  <rect x="770" y="120" width="330" height="30" rx="6" fill="#0f172a"/>
  <circle cx="785" cy="135" r="5" fill="#ef4444"/>
  <circle cx="805" cy="135" r="5" fill="#eab308"/>
  <circle cx="825" cy="135" r="5" fill="#22c55e"/>
  <rect x="770" y="170" width="330" height="340" rx="4" fill="#0f172a"/>
  <rect x="790" y="190" width="100" height="12" rx="2" fill="#34d399" opacity="0.6"/>
  <rect x="790" y="215" width="200" height="8" rx="2" fill="#475569"/>
