  <text x="130" y="252" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">App Generator</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="32" fill="#34d399">Build Desktop Apps with AI</text>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">Describe what you want in plain English.</text>
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">AI builds a complete desktop application.</text>
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="24" fill="#64748b">app.website-generator.net</text>
