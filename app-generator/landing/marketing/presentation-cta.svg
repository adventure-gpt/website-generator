<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Large decorative glow -->
  <circle cx="960" cy="540" r="500" fill="#34d399" opacity="0.03"/>
  <circle cx="960" cy="540" r="300" fill="#34d399" opacity="0.03"/>
  <!-- Header -->
  <rect x="80" y="60" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <text x="180" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">App Generator</text>
  <text x="1840" y="100" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="end">app.website-generator.net</text>
  <!-- Main CTA content -->
  <text x="960" y="350" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Start Building Today</text>
  <text x="960" y="430" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">Transform your ideas into desktop applications with AI.</text>
  <text x="960" y="480" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">No coding experience needed.</text>
  <!-- Large CTA button -->
  <rect x="710" y="540" width="500" height="90" rx="45" fill="url(#accent)"/>
  <text x="960" y="598" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- Platform badges -->
  <rect x="560" y="680" width="240" height="50" rx="10" fill="#1e293b"/>
  <text x="680" y="712" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Windows</text>
  <rect x="840" y="680" width="240" height="50" rx="10" fill="#1e293b"/>
  <text x="960" y="712" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">macOS</text>
  <rect x="1120" y="680" width="240" height="50" rx="10" fill="#1e293b"/>
  <text x="1240" y="712" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Linux</text>
  <!-- Free badge -->
  <rect x="810" y="780" width="300" height="50" rx="25" fill="url(#accent)" opacity="0.15"/>
  <text x="960" y="812" font-family="Arial, sans-serif" font-size="20" fill="#34d399" text-anchor="middle">Free &amp; Open Source Forever</text>
  <!-- URL large -->
  <text x="960" y="910" font-family="Arial, sans-serif" font-size="36" fill="#34d399" text-anchor="middle">app.website-generator.net</text>
  <!-- Page indicator -->
  <text x="960" y="1010" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">Get Started</text>
</svg>