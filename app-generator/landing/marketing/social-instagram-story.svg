<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="900" cy="200" r="300" fill="#34d399" opacity="0.05"/>
  <circle cx="180" cy="1700" r="250" fill="#10b981" opacity="0.05"/>
  <!-- Logo -->
  <rect x="440" y="500" width="200" height="200" rx="40" fill="url(#accent)"/>
  <text x="540" y="640" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Product name -->
  <text x="540" y="820" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <!-- Tagline -->
  <text x="540" y="950" font-family="Arial, sans-serif" font-size="48" fill="#34d399" text-anchor="middle">Build Desktop Apps</text>
  <text x="540" y="1020" font-family="Arial, sans-serif" font-size="48" fill="#34d399" text-anchor="middle">with AI</text>
  <!-- Description -->
  <text x="540" y="1200" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8" text-anchor="middle">Describe it.</text>
  <text x="540" y="1260" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8" text-anchor="middle">AI builds it.</text>
  <!-- CTA Button -->
  <rect x="290" y="1380" width="500" height="90" rx="45" fill="url(#accent)"/>
  <text x="540" y="1440" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- Free badge -->
  <text x="540" y="1540" font-family="Arial, sans-serif" font-size="30" fill="#34d399" text-anchor="middle">Free &amp; open source</text>
  <!-- URL -->
  <text x="540" y="1800" font-family="Arial, sans-serif" font-size="32" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
</svg>