<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="430" cy="60" r="100" fill="#34d399" opacity="0.05"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="500" height="5" fill="url(#accent)"/>
  <!-- Logo + Title row -->
  <rect x="40" y="50" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="80" y="105" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <text x="140" y="82" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">App Generator</text>
  <text x="140" y="116" font-family="Arial, sans-serif" font-size="16" fill="#34d399">Build Desktop Apps with AI</text>
  <!-- Description -->
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Describe what you want in plain English.</text>
  <text x="40" y="200" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">AI generates a complete desktop app.</text>
  <!-- Feature pills -->
  <rect x="40" y="235" width="100" height="28" rx="14" fill="#1e293b"/>
  <text x="90" y="254" font-family="Arial, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">Free</text>
  <rect x="155" y="235" width="130" height="28" rx="14" fill="#1e293b"/>
  <text x="220" y="254" font-family="Arial, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">Cross-Platform</text>
  <rect x="300" y="235" width="120" height="28" rx="14" fill="#1e293b"/>
  <text x="360" y="254" font-family="Arial, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">Open Source</text>
  <!-- CTA + URL -->
  <rect x="40" y="290" width="170" height="36" rx="18" fill="url(#accent)"/>
  <text x="125" y="314" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <text x="240" y="314" font-family="Arial, sans-serif" font-size="14" fill="#64748b">app.website-generator.net</text>
</svg>