<svg xmlns="http://www.w3.org/2000/svg" width="300" height="250" viewBox="0 0 300 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="300" height="250" fill="url(#bg)"/>
  <rect x="0" y="0" width="300" height="250" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- Logo -->
  <rect x="115" y="20" width="70" height="70" rx="14" fill="url(#accent)"/>
  <text x="150" y="73" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Text -->
  <text x="150" y="120" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <text x="150" y="148" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Build Desktop Apps with AI</text>
  <!-- CTA -->
  <rect x="75" y="170" width="150" height="36" rx="18" fill="url(#accent)"/>
  <text x="150" y="194" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- URL -->
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
</svg>