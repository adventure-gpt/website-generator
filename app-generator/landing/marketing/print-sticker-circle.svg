<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>
  <!-- Circle border -->
  <circle cx="200" cy="200" r="198" fill="url(#accent)"/>
  <!-- Circle background -->
  <circle cx="200" cy="200" r="192" fill="url(#bg)"/>
  <!-- Decorative glow -->
  <circle cx="200" cy="200" r="150" fill="#34d399" opacity="0.03" clip-path="url(#circle-clip)"/>
  <!-- Logo -->
  <rect x="140" y="70" width="120" height="120" rx="24" fill="url(#accent)"/>
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="84" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Name -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <!-- Tagline -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Build Desktop Apps with AI</text>
  <!-- Free badge -->
  <text x="200" y="305" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Free &amp; Open Source</text>
  <!-- URL -->
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
</svg>