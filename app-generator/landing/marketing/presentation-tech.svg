<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="80" y="60" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <text x="180" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">App Generator</text>
  <text x="1840" y="100" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="end">app.website-generator.net</text>
  <!-- Title -->
  <text x="960" y="230" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">Technology Stack</text>
  <rect x="860" y="250" width="200" height="4" rx="2" fill="#34d399"/>
  <text x="960" y="295" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Built on battle-tested, production-grade technologies</text>

  <!-- Architecture diagram -->
  <!-- AI Layer -->
  <rect x="560" y="350" width="800" height="80" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="960" y="400" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#34d399" text-anchor="middle">AI Engine (Claude)</text>

  <!-- Arrow down -->
  <line x1="960" y1="430" x2="960" y2="470" stroke="#34d399" stroke-width="2"/>
  <polygon points="950,465 970,465 960,480" fill="#34d399"/>

  <!-- App Framework Layer -->
  <rect x="160" y="480" width="1600" height="100" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="960" y="520" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Application Framework</text>
  <!-- Tech badges -->
  <rect x="300" y="535" width="120" height="30" rx="6" fill="#0f172a"/>
  <text x="360" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Electron</text>
  <rect x="450" y="535" width="100" height="30" rx="6" fill="#0f172a"/>
  <text x="500" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">React</text>
  <rect x="580" y="535" width="100" height="30" rx="6" fill="#0f172a"/>
  <text x="630" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Vite</text>
  <rect x="710" y="535" width="140" height="30" rx="6" fill="#0f172a"/>
  <text x="780" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Tailwind CSS</text>
  <rect x="880" y="535" width="120" height="30" rx="6" fill="#0f172a"/>
  <text x="940" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">SQLite</text>
  <rect x="1030" y="535" width="170" height="30" rx="6" fill="#0f172a"/>
  <text x="1115" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">electron-store</text>
  <rect x="1230" y="535" width="180" height="30" rx="6" fill="#0f172a"/>
  <text x="1320" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">electron-updater</text>
  <rect x="1440" y="535" width="180" height="30" rx="6" fill="#0f172a"/>
  <text x="1530" y="556" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">electron-builder</text>

  <!-- Arrow down -->
  <line x1="960" y1="580" x2="960" y2="620" stroke="#34d399" stroke-width="2"/>
  <polygon points="950,615 970,615 960,630" fill="#34d399"/>

  <!-- Three columns for output -->
  <rect x="160" y="640" width="480" height="180" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="400" y="690" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Frontend</text>
  <text x="400" y="730" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">React Components</text>
  <text x="400" y="755" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Tailwind Styling</text>
  <text x="400" y="780" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Framer Motion Animations</text>

  <rect x="720" y="640" width="480" height="180" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="960" y="690" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Backend</text>
  <text x="960" y="730" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Electron Main Process</text>
  <text x="960" y="755" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">IPC Communication</text>
  <text x="960" y="780" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Context Isolation Security</text>

  <rect x="1280" y="640" width="480" height="180" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="1520" y="690" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Distribution</text>
  <text x="1520" y="730" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Cross-Platform Installers</text>
  <text x="1520" y="755" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">GitHub Releases</text>
  <text x="1520" y="780" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Auto-Update System</text>

  <!-- Bottom -->
  <rect x="400" y="880" width="1120" height="60" rx="12" fill="#1e293b"/>
  <text x="960" y="918" font-family="Arial, sans-serif" font-size="20" fill="#34d399" text-anchor="middle">Every generated app follows production-grade best practices</text>

  <!-- Page indicator -->
  <text x="960" y="1010" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">Technology</text>
</svg>