<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="800" cy="150" r="250" fill="#34d399" opacity="0.04"/>
  <circle cx="200" cy="1350" r="200" fill="#10b981" opacity="0.04"/>
  <!-- Logo -->
  <rect x="400" y="120" width="200" height="200" rx="40" fill="url(#accent)"/>
  <text x="500" y="260" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Title -->
  <text x="500" y="430" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">App Generator</text>
  <!-- Divider -->
  <rect x="400" y="470" width="200" height="4" rx="2" fill="#34d399"/>
  <!-- Steps -->
  <circle cx="150" cy="590" r="30" fill="url(#accent)"/>
  <text x="150" y="600" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">1</text>
  <text x="210" y="600" font-family="Arial, sans-serif" font-size="30" fill="white">Describe your app idea</text>
  <circle cx="150" cy="700" r="30" fill="url(#accent)"/>
  <text x="150" y="710" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">2</text>
  <text x="210" y="710" font-family="Arial, sans-serif" font-size="30" fill="white">AI generates the code</text>
  <circle cx="150" cy="810" r="30" fill="url(#accent)"/>
  <text x="150" y="820" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">3</text>
  <text x="210" y="820" font-family="Arial, sans-serif" font-size="30" fill="white">Download your desktop app</text>
  <!-- App window mockup -->
  <rect x="100" y="920" width="800" height="350" rx="16" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <rect x="120" y="940" width="760" height="30" rx="6" fill="#0f172a"/>
  <circle cx="140" cy="955" r="6" fill="#ef4444"/>
  <circle cx="162" cy="955" r="6" fill="#eab308"/>
  <circle cx="184" cy="955" r="6" fill="#22c55e"/>
  <rect x="120" y="985" width="200" height="265" rx="4" fill="#0f172a"/>
  <rect x="340" y="985" width="540" height="265" rx="4" fill="#0f172a"/>
  <rect x="140" y="1005" width="160" height="10" rx="2" fill="#34d399" opacity="0.5"/>
  <rect x="140" y="1030" width="120" height="8" rx="2" fill="#475569"/>
  <rect x="140" y="1050" width="140" height="8" rx="2" fill="#475569"/>
  <rect x="140" y="1070" width="100" height="8" rx="2" fill="#475569"/>
  <rect x="360" y="1005" width="300" height="12" rx="2" fill="#34d399" opacity="0.4"/>
  <rect x="360" y="1035" width="480" height="8" rx="2" fill="#475569"/>
  <rect x="360" y="1055" width="440" height="8" rx="2" fill="#475569"/>
  <!-- Free badge -->
  <rect x="350" y="1330" width="300" height="50" rx="25" fill="url(#accent)"/>
  <text x="500" y="1363" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">Free &amp; Open Source</text>
  <!-- URL -->
  <text x="500" y="1450" font-family="Arial, sans-serif" font-size="28" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
</svg>