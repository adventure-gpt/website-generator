<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Large decorative glow -->
  <circle cx="640" cy="360" r="400" fill="#34d399" opacity="0.03"/>
  <circle cx="1100" cy="100" r="200" fill="#10b981" opacity="0.05"/>
  <!-- Logo large -->
  <rect x="80" y="200" width="160" height="160" rx="32" fill="url(#accent)"/>
  <text x="160" y="312" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Title -->
  <text x="280" y="270" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Build Desktop</text>
  <text x="280" y="355" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#34d399">Apps with AI</text>
  <!-- Subtitle -->
  <text x="280" y="420" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8">Describe it. AI builds it. Download it.</text>
  <!-- Play button hint -->
  <circle cx="640" cy="560" r="50" fill="url(#accent)" opacity="0.9"/>
  <polygon points="625,535 625,585 665,560" fill="#0f172a"/>
  <!-- App name -->
  <text x="80" y="660" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">App Generator</text>
  <!-- Free badge -->
  <rect x="450" y="630" width="180" height="40" rx="20" fill="url(#accent)" opacity="0.2"/>
  <text x="540" y="657" font-family="Arial, sans-serif" font-size="20" fill="#34d399" text-anchor="middle">FREE &amp; OPEN SOURCE</text>
  <!-- URL -->
  <text x="1200" y="660" font-family="Arial, sans-serif" font-size="24" fill="#64748b" text-anchor="end">app.website-generator.net</text>
</svg>