<svg xmlns="http://www.w3.org/2000/svg" width="160" height="600" viewBox="0 0 160 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="160" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="160" height="600" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- Logo -->
  <rect x="40" y="40" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="80" y="97" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Name -->
  <text x="80" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">App</text>
  <text x="80" y="177" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Generator</text>
  <!-- Divider -->
  <rect x="50" y="200" width="60" height="2" rx="1" fill="#34d399"/>
  <!-- Tagline -->
  <text x="80" y="235" font-family="Arial, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">Build Desktop</text>
  <text x="80" y="255" font-family="Arial, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">Apps with AI</text>
  <!-- Features -->
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">No coding needed</text>
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Win / Mac / Linux</text>
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Free &amp; open source</text>
  <!-- Mockup hint -->
  <rect x="20" y="410" width="120" height="90" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="28" y="418" width="104" height="14" rx="3" fill="#0f172a"/>
  <circle cx="35" cy="425" r="2.5" fill="#ef4444"/>
  <circle cx="44" cy="425" r="2.5" fill="#eab308"/>
  <circle cx="53" cy="425" r="2.5" fill="#22c55e"/>
  <rect x="28" y="438" width="30" height="54" rx="2" fill="#0f172a"/>
  <rect x="63" y="438" width="69" height="54" rx="2" fill="#0f172a"/>
  <!-- CTA -->
  <rect x="20" y="525" width="120" height="32" rx="16" fill="url(#accent)"/>
  <text x="80" y="546" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- URL -->
  <text x="80" y="582" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">app.website-generator.net</text>
</svg>