<svg xmlns="http://www.w3.org/2000/svg" width="320" height="50" viewBox="0 0 320 50">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="320" height="50" fill="url(#bg)"/>
  <rect x="0" y="0" width="320" height="50" fill="none" stroke="#1e293b" stroke-width="1"/>
  <!-- Logo -->
  <rect x="8" y="8" width="34" height="34" rx="7" fill="url(#accent)"/>
  <text x="25" y="32" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Text -->
  <text x="55" y="24" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">App Generator</text>
  <text x="55" y="39" font-family="Arial, sans-serif" font-size="9" fill="#34d399">Build Desktop Apps with AI</text>
  <!-- CTA -->
  <rect x="230" y="10" width="80" height="30" rx="15" fill="url(#accent)"/>
  <text x="270" y="30" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">Get Free</text>
</svg>