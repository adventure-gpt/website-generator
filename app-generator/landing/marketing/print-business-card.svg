<svg xmlns="http://www.w3.org/2000/svg" width="350" height="200" viewBox="0 0 350 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="350" height="200" fill="url(#bg)"/>
  <!-- Subtle corner accent -->
  <circle cx="320" cy="30" r="60" fill="#34d399" opacity="0.05"/>
  <!-- Logo -->
  <rect x="25" y="35" width="60" height="60" rx="12" fill="url(#accent)"/>
  <text x="55" y="78" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- App name -->
  <text x="100" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">App Generator</text>
  <text x="100" y="82" font-family="Arial, sans-serif" font-size="10" fill="#34d399">Build Desktop Apps with AI</text>
  <!-- Divider -->
  <rect x="25" y="115" width="300" height="1" fill="#1e293b"/>
  <!-- Details -->
  <text x="25" y="140" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Free &amp; open source desktop app builder</text>
  <text x="25" y="162" font-family="Arial, sans-serif" font-size="12" fill="#34d399">app.website-generator.net</text>
  <text x="25" y="182" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Windows | macOS | Linux</text>
</svg>