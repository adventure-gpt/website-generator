<svg xmlns="http://www.w3.org/2000/svg" width="336" height="280" viewBox="0 0 336 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="336" height="280" fill="url(#bg)"/>
  <rect x="0" y="0" width="336" height="280" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- Decorative -->
  <circle cx="290" cy="40" r="80" fill="#34d399" opacity="0.05"/>
  <!-- Logo + name row -->
  <rect x="25" y="25" width="56" height="56" rx="12" fill="url(#accent)"/>
  <text x="53" y="64" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <text x="95" y="50" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">App Generator</text>
  <text x="95" y="72" font-family="Arial, sans-serif" font-size="13" fill="#34d399">Build Desktop Apps with AI</text>
  <!-- Description -->
  <text x="25" y="115" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Describe what you want. AI builds a</text>
  <text x="25" y="135" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">complete desktop app. No code needed.</text>
  <!-- Mini mockup -->
  <rect x="25" y="155" width="286" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="35" y="163" width="266" height="14" rx="3" fill="#0f172a"/>
  <circle cx="45" cy="170" r="3" fill="#ef4444"/>
  <circle cx="55" cy="170" r="3" fill="#eab308"/>
  <circle cx="65" cy="170" r="3" fill="#22c55e"/>
  <rect x="35" y="183" width="70" height="34" rx="2" fill="#0f172a"/>
  <rect x="112" y="183" width="189" height="34" rx="2" fill="#0f172a"/>
  <!-- CTA -->
  <rect x="75" y="240" width="186" height="30" rx="15" fill="url(#accent)"/>
  <text x="168" y="261" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
