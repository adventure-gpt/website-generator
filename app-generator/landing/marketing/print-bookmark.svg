<svg xmlns="http://www.w3.org/2000/svg" width="200" height="600" viewBox="0 0 200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="200" height="600" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="200" height="6" fill="url(#accent)"/>
  <!-- Logo -->
  <rect x="55" y="40" width="90" height="90" rx="18" fill="url(#accent)"/>
  <text x="100" y="103" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Name -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">App</text>
  <text x="100" y="196" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Generator</text>
  <!-- Divider -->
  <rect x="70" y="220" width="60" height="2" rx="1" fill="#34d399"/>
  <!-- Tagline vertical -->
  <text x="100" y="265" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Build Desktop</text>
  <text x="100" y="285" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Apps with AI</text>
  <!-- Features -->
  <text x="100" y="340" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">No coding required</text>
  <text x="100" y="365" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Cross-platform</text>
  <text x="100" y="390" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Free &amp; open source</text>
  <!-- Mini mockup -->
  <rect x="30" y="420" width="140" height="80" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <rect x="38" y="428" width="124" height="12" rx="3" fill="#0f172a"/>
  <circle cx="46" cy="434" r="2.5" fill="#ef4444"/>
  <circle cx="55" cy="434" r="2.5" fill="#eab308"/>
  <circle cx="64" cy="434" r="2.5" fill="#22c55e"/>
  <rect x="38" y="446" width="35" height="46" rx="2" fill="#0f172a"/>
  <rect x="78" y="446" width="84" height="46" rx="2" fill="#0f172a"/>
  <!-- URL -->
  <text x="100" y="540" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">app.website-</text>
  <text x="100" y="555" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">generator.net</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="594" width="200" height="6" fill="url(#accent)"/>
</svg>