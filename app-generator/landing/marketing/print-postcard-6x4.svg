<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="520" cy="80" r="120" fill="#34d399" opacity="0.05"/>
  <circle cx="80" cy="340" r="100" fill="#10b981" opacity="0.05"/>
  <!-- Logo -->
  <rect x="40" y="80" width="100" height="100" rx="20" fill="url(#accent)"/>
  <text x="90" y="150" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
  <!-- Content -->
  <text x="170" y="120" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">App Generator</text>
  <text x="170" y="158" font-family="Arial, sans-serif" font-size="18" fill="#34d399">Build Desktop Apps with AI</text>
  <!-- Description -->
  <text x="40" y="230" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Describe what you want in plain English.</text>
  <text x="40" y="255" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">AI generates a complete desktop application.</text>
  <text x="40" y="280" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Free and open source. No coding required.</text>
  <!-- CTA -->
  <rect x="40" y="310" width="200" height="44" rx="22" fill="url(#accent)"/>
  <text x="140" y="339" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Download Free</text>
  <!-- URL -->
  <text x="40" y="380" font-family="Arial, sans-serif" font-size="14" fill="#64748b">app.website-generator.net</text>
  <!-- QR placeholder -->
  <rect x="490" y="290" width="80" height="80" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="530" y="335" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">QR CODE</text>
</svg>